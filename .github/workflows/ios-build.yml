name: iOS Build (local on macOS runner)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - development
          - production

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build iOS (.ipa) locally on the macOS runner
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform ios \
            --profile ${{ github.event.inputs.profile }} \
            --local \
            --non-interactive \
            --output "$GITHUB_WORKSPACE/AthanNow-${{ github.event.inputs.profile }}.ipa"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: AthanNow-${{ github.event.inputs.profile }}-ipa
          path: ${{ github.workspace }}/AthanNow-*.ipa
          if-no-files-found: error
          retention-days: 14
